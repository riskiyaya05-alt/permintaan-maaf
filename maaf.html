<!DOCTYPE html>
<html lang="id">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Maaf ya Michi ❤️</title>


    <style>

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family:
                'Segoe UI',
                Arial,
                sans-serif;
        }


        body {

            min-height: 100vh;

            background:
                linear-gradient(
                    135deg,
                    #ff758c,
                    #ff7eb3
                );

            display: flex;

            justify-content: center;

            align-items: center;

            padding: 20px;

            overflow: hidden;
        }


        /* KARTU */

        .card {

            width: 100%;

            max-width: 500px;

            background:
                rgba(
                    255,
                    255,
                    255,
                    0.96
                );

            padding:
                40px 30px;

            border-radius: 25px;

            text-align: center;

            box-shadow:
                0 15px 40px
                rgba(
                    0,
                    0,
                    0,
                    0.2
                );

            position: relative;

            z-index: 10;

            animation:
                muncul 1.2s ease;
        }


        @keyframes muncul {

            from {

                opacity: 0;

                transform:
                    translateY(50px);

            }

            to {

                opacity: 1;

                transform:
                    translateY(0);

            }

        }


        /* HATI BESAR */

        .big-heart {

            font-size: 80px;

            animation:
                detak 1.5s infinite;

            margin-bottom: 10px;
        }


        @keyframes detak {

            0% {
                transform:
                    scale(1);
            }

            25% {
                transform:
                    scale(1.15);
            }

            40% {
                transform:
                    scale(1);
            }

            60% {
                transform:
                    scale(1.15);
            }

            100% {
                transform:
                    scale(1);
            }

        }


        /* JUDUL */

        h1 {

            color:
                #ff4f70;

            font-size:
                30px;

            margin-bottom:
                25px;
        }


        /* PESAN */

        .message {

            color:
                #555;

            font-size:
                17px;

            line-height:
                1.8;
        }


        .message p {

            margin-bottom:
                18px;
        }


        .love {

            color:
                #ff4f70;

            font-weight:
                bold;

            font-size:
                18px;
        }


        /* TOMBOL */

        button {

            margin-top:
                15px;

            padding:
                14px 30px;

            border:
                none;

            border-radius:
                30px;

            background:
                #ff4f70;

            color:
                white;

            font-size:
                16px;

            cursor:
                pointer;

            transition:
                0.3s;
        }


        button:hover {

            transform:
                scale(1.08);

            background:
                #ff2f58;
        }


        /* PESAN SETELAH DIKLIK */

        #response {

            display:
                none;

            margin-top:
                20px;

            color:
                #ff4f70;

            font-weight:
                bold;

            font-size:
                16px;

            line-height:
                1.6;
        }


        /* HATI TERBANG */

        .floating-heart {

            position:
                fixed;

            bottom:
                -50px;

            font-size:
                25px;

            opacity:
                0.7;

            z-index:
                1;

            animation:
                naik 6s
                linear infinite;
        }


        @keyframes naik {

            0% {

                transform:
                    translateY(0)
                    rotate(0deg);

                opacity:
                    0;
            }

            20% {

                opacity:
                    0.8;
            }

            100% {

                transform:
                    translateY(-110vh)
                    rotate(360deg);

                opacity:
                    0;
            }

        }


        .hati1 {

            left:
                10%;

            animation-delay:
                0s;
        }


        .hati2 {

            left:
                30%;

            animation-delay:
                2s;
        }


        .hati3 {

            left:
                55%;

            animation-delay:
                4s;
        }


        .hati4 {

            left:
                80%;

            animation-delay:
                1s;
        }

    </style>

</head>


<body>


    <!-- HATI TERBANG -->

    <div class="floating-heart hati1">
        ❤️
    </div>

    <div class="floating-heart hati2">
        💗
    </div>

    <div class="floating-heart hati3">
        💕
    </div>

    <div class="floating-heart hati4">
        💖
    </div>


    <!-- KARTU PERMINTAAN MAAF -->

    <div class="card">


        <div class="big-heart">
            ❤️
        </div>


        <h1>
            Maaf ya Michi 🥺❤️
        </h1>


        <div class="message">


            <p>
                Maaf ya Michi...
            </p>


            <p>
                Adam salah.
            </p>


            <p>
                Adam udah bobo bikin Michi bete,
                habis tenaga Michi.
            </p>


            <p>
                Kalo Michi marah,
                Adam minta maaf nian ya Michi 🥺
            </p>


            <p class="love">
                Michi, Adam sayang nian samo Michi.
            </p>


            <p class="love">
                Sumpah ❤️
            </p>


        </div>


        <button onclick="maafinAdam()">

            Maafin Adam ya Michi ❤️

        </button>


        <div id="response">

            Makasih ya Michi 🥺❤️

            <br>

            Adam sayang nian samo Michi.

            <br>

            Sumpah ❤️

        </div>


    </div>


    <script>

        function maafinAdam() {

            document
                .getElementById("response")
                .style.display = "block";


            document
                .querySelector("button")
                .innerHTML =
                "Makasih ya Michi ❤️";


            // Hati tambahan

            for (
                let i = 0;
                i < 10;
                i++
            ) {

                const heart =
                    document.createElement(
                        "div"
                    );

                heart.innerHTML = "❤️";

                heart.style.position =
                    "fixed";

                heart.style.left =
                    Math.random() * 100 + "%";

                heart.style.bottom =
                    "0";

                heart.style.fontSize =
                    "25px";

                heart.style.zIndex =
                    "100";

                heart.style.transition =
                    "4s";

                document.body.appendChild(
                    heart
                );


                setTimeout(
                    function() {

                        heart.style.transform =
                            "translateY(-100vh)";

                        heart.style.opacity =
                            "0";

                    },
                    100
                );


                setTimeout(
                    function() {

                        heart.remove();

                    },
                    4000
                );

            }

        }

    </script>


</body>

</html>
