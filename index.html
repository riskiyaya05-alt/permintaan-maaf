<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Untuk Michi ❤️</title>

    <!-- Library QR Code -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

    <style>

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Arial, sans-serif;
        }

        body {
            min-height: 100vh;

            background: linear-gradient(
                135deg,
                #ff758c,
                #ff7eb3
            );

            display: flex;
            justify-content: center;
            align-items: center;

            padding: 20px;

            overflow: hidden;
        }

        /* KARTU UTAMA */

        .container {
            width: 100%;
            max-width: 420px;

            background: rgba(255, 255, 255, 0.96);

            padding: 35px 25px;

            border-radius: 25px;

            text-align: center;

            box-shadow:
                0 15px 40px rgba(0, 0, 0, 0.2);

            position: relative;

            z-index: 10;

            animation: muncul 1s ease;
        }

        @keyframes muncul {

            from {
                opacity: 0;
                transform: translateY(40px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }

        }

        /* HATI */

        .heart {
            font-size: 70px;

            margin-bottom: 10px;

            animation:
                detak 1.5s infinite;
        }

        @keyframes detak {

            0% {
                transform: scale(1);
            }

            25% {
                transform: scale(1.15);
            }

            40% {
                transform: scale(1);
            }

            60% {
                transform: scale(1.15);
            }

            100% {
                transform: scale(1);
            }

        }

        /* JUDUL */

        h1 {
            color: #ff4f70;

            font-size: 30px;

            margin-bottom: 10px;
        }

        /* SUBTITLE */

        .subtitle {
            color: #666;

            font-size: 16px;

            line-height: 1.6;

            margin-bottom: 20px;
        }

        /* QR CODE */

        .qr-box {
            width: 240px;

            height: 240px;

            background: white;

            padding: 15px;

            margin: 20px auto;

            border-radius: 20px;

            display: flex;

            justify-content: center;

            align-items: center;

            box-shadow:
                0 5px 20px rgba(0, 0, 0, 0.15);
        }

        #qrcode {
            width: 200px;
            height: 200px;

            display: flex;

            justify-content: center;

            align-items: center;
        }

        #qrcode img {
            width: 200px;
            height: 200px;
        }

        /* INSTRUKSI */

        .instruction {
            color: #555;

            font-size: 14px;

            line-height: 1.7;
        }

        /* FOOTER */

        .footer {
            margin-top: 20px;

            color: #ff4f70;

            font-size: 13px;

            font-weight: bold;
        }

        /* HATI TERBANG */

        .floating-heart {
            position: fixed;

            bottom: -50px;

            font-size: 25px;

            opacity: 0.7;

            z-index: 1;

            animation:
                naik 6s linear infinite;
        }

        @keyframes naik {

            0% {
                transform:
                    translateY(0)
                    rotate(0deg);

                opacity: 0;
            }

            20% {
                opacity: 0.8;
            }

            100% {
                transform:
                    translateY(-110vh)
                    rotate(360deg);

                opacity: 0;
            }

        }

        .hati1 {
            left: 10%;
            animation-delay: 0s;
        }

        .hati2 {
            left: 30%;
            animation-delay: 2s;
        }

        .hati3 {
            left: 55%;
            animation-delay: 4s;
        }

        .hati4 {
            left: 80%;
            animation-delay: 1s;
        }

    </style>

</head>


<body>


    <!-- HATI TERBANG -->

    <div class="floating-heart hati1">
        ❤️
    </div>

    <div class="floating-heart hati2">
        💗
    </div>

    <div class="floating-heart hati3">
        💕
    </div>

    <div class="floating-heart hati4">
        💖
    </div>


    <!-- KONTEN -->

    <div class="container">

        <div class="heart">
            ❤️
        </div>


        <h1>
            Untuk Michi ❤️
        </h1>


        <p class="subtitle">

            Maafin Adam yo...

            <br>

            Cubolah tengok ini dulu.

            <br>

            Plisss 🥺❤️

        </p>


        <!-- QR CODE -->

        <div class="qr-box">

            <div id="qrcode"></div>

        </div>


        <p class="instruction">

            📱 Scan QR Code di atas

            <br>

            Ada pesan dari Adam khusus untuk Michi ❤️

        </p>


        <div class="footer">

            Dibuat dengan ❤️ khusus untuk Michi

        </div>

    </div>


    <script>

        /*
        =========================================
        LINK HALAMAN PERMINTAAN MAAF
        =========================================
        */

       const linkPermintaanMaaf =
            "https://riskiyaya05-alt.github.io/permintaan-maaf/maaf.html";

        /*
        =========================================
        MEMBUAT QR CODE
        =========================================
        */

        new QRCode(

            document.getElementById("qrcode"),

            {

                text: linkPermintaanMaaf,

                width: 200,

                height: 200,

                colorDark: "#ff4f70",

                colorLight: "#ffffff",

                correctLevel:
                    QRCode.CorrectLevel.H

            }

        );

    </script>


</body>

</html>
