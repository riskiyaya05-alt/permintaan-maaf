<!DOCTYPE html>
<html lang="id">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Maaf ya Michi ❤️</title>

    <style>

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            min-height: 100vh;

            background: linear-gradient(
                135deg,
                #ff758c,
                #ff7eb3
            );

            display: flex;
            justify-content: center;
            align-items: center;

            padding: 20px;

            overflow: hidden;
        }

        .card {

            width: 100%;
            max-width: 500px;

            background: rgba(255, 255, 255, 0.95);

            padding: 40px 30px;

            border-radius: 25px;

            text-align: center;

            box-shadow:
                0 15px 40px rgba(0, 0, 0, 0.2);

            animation: muncul 1.5s ease;

            position: relative;

            z-index: 2;
        }

        @keyframes muncul {

            from {
                opacity: 0;
                transform: translateY(50px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }

        }

        .heart {

            font-size: 75px;

            animation:
                detak 1.5s infinite;

            margin-bottom: 15px;
        }

        @keyframes detak {

            0% {
                transform: scale(1);
            }

            25% {
                transform: scale(1.15);
            }

            40% {
                transform: scale(1);
            }

            60% {
                transform: scale(1.15);
            }

            100% {
                transform: scale(1);
            }

        }

        h1 {

            color: #ff4f70;

            font-size: 30px;

            margin-bottom: 25px;
        }

        .message {

            color: #555;

            font-size: 17px;

            line-height: 1.8;
        }

        .message p {

            margin-bottom: 18px;
        }

        .love {

            color: #ff4f70;

            font-weight: bold;
        }

        button {

            margin-top: 15px;

            padding: 14px 30px;

            border: none;

            border-radius: 30px;

            background: #ff4f70;

            color: white;

            font-size: 16px;

            cursor: pointer;

            transition: 0.3s;
        }

        button:hover {

            transform: scale(1.08);

            background: #ff2f58;
        }

        #response {

            display: none;

            margin-top: 20px;

            color: #ff4f70;

            font-weight: bold;

            font-size: 16px;
        }

        /* HATI TERBANG */

        .floating-heart {

            position: fixed;

            bottom: -50px;

            font-size: 25px;

            animation:
                naik 6s linear infinite;

            opacity: 0.7;
        }

        @keyframes naik {

            0% {

                transform:
                    translateY(0)
                    rotate(0deg);

                opacity: 0;
            }

            20% {

                opacity: 1;
            }

            100% {

                transform:
                    translateY(-110vh)
                    rotate(360deg);

                opacity: 0;
            }

        }

        .h1 {
            left: 10%;
            animation-delay: 0s;
        }

        .h2 {
            left: 30%;
            animation-delay: 2s;
        }

        .h3 {
            left: 55%;
            animation-delay: 4s;
        }

        .h4 {
            left: 80%;
            animation-delay: 1s;
        }

    </style>

</head>


<body>


    <!-- HATI TERBANG -->

    <div class="floating-heart h1">
        ❤️
    </div>

    <div class="floating-heart h2">
        💗
    </div>

    <div class="floating-heart h3">
        💕
    </div>

    <div class="floating-heart h4">
        💖
    </div>


    <!-- ISI PESAN -->

    <div class="card">


        <div class="heart">
            ❤️
        </div>


        <h1>
            Maaf ya Michi 🥺❤️
        </h1>


        <div class="message">


            <p>
                Maaf ya Michi...
            </p>


            <p>
                Adam salah.
            </p>


            <p>
                Adam udah bobo bikin Michi bete,
                habis tenaga Michi.
            </p>


            <p>
                Kalo Michi marah,
                Adam minta maaf nian ya Michi 🥺
            </p>


            <p class="love">
                Michi, Adam sayang nian samo Michi.
            </p>


            <p class="love">
                Sumpah ❤️
            </p>


        </div>


        <button onclick="maafin()">
            Maafin Adam ya Michi ❤️
        </button>


        <div id="response">

            Makasih ya Michi 🥺❤️
            <br>
            Adam sayang nian samo Michi.

        </div>


    </div>


    <script>

        function maafin() {

            document
                .getElementById("response")
                .style.display = "block";

            document
                .querySelector("button")
                .innerHTML =
                "Makasih ya Michi ❤️";

        }

    </script>


</body>

</html>
